name: Bootstrap image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: true
        default: gwen-main-v0.1.149-custom
      reported_version:
        description: Version reported by the application
        required: true
        default: 0.1.149
      image_tag:
        description: Container image tag
        required: true
        default: bootstrap-0.1.149-update-agent
      force_unhealthy:
        description: Force the image healthcheck to fail
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      BUILD_REF: ${{ inputs.ref }}
      REPORTED_VERSION: ${{ inputs.reported_version }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      FORCE_UNHEALTHY_HEALTHCHECK: ${{ inputs.force_unhealthy }}
      OCI_SOURCE: https://github.com/gwenliu1025/sub2api
      IMAGE_REPOSITORY: ghcr.io/gwenliu1025/sub2api
    steps:
      - name: Check out workflow validation
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Validate inputs
        shell: bash
        run: .github/scripts/validate-bootstrap-image-inputs.sh "$REPORTED_VERSION" "$IMAGE_TAG" "$FORCE_UNHEALTHY_HEALTHCHECK"

      - name: Check out requested ref
        uses: actions/checkout@v6
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bootstrap image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
          build-args: |
            VERSION=${{ env.REPORTED_VERSION }}
            OCI_SOURCE=${{ env.OCI_SOURCE }}
            FORCE_UNHEALTHY_HEALTHCHECK=${{ env.FORCE_UNHEALTHY_HEALTHCHECK }}
