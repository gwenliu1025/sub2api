name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example, v0.1.150)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  validate_release_version:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6
      - id: version
        name: Validate release and image version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${RELEASE_TAG#v}"
          .github/scripts/validate-release-version.sh "$RELEASE_TAG" "$IMAGE_TAG"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  update_version:
    needs: validate_release_version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate_release_version.outputs.release_tag }}
      - name: Write release version
        env:
          IMAGE_TAG: ${{ needs.validate_release_version.outputs.image_tag }}
        run: printf '%s\n' "$IMAGE_TAG" > backend/cmd/server/VERSION
      - uses: actions/upload-artifact@v7
        with:
          name: version-file
          path: backend/cmd/server/VERSION
          retention-days: 1

  build_frontend:
    needs: validate_release_version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate_release_version.outputs.release_tag }}
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Build frontend
        run: pnpm run build
        working-directory: frontend
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: backend/internal/web/dist/
          retention-days: 1

  release:
    needs: [validate_release_version, update_version, build_frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.validate_release_version.outputs.release_tag }}
      - name: Resolve checked-out revision
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v8
        with:
          name: version-file
          path: backend/cmd/server/
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: backend/internal/web/dist/
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: go version | grep -q "go1.26.5"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Read annotated tag message
        id: tag_message
        env:
          RELEASE_TAG: ${{ needs.validate_release_version.outputs.release_tag }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          {
            echo "message<<EOF"
            git tag -l --format='%(contents:body)' "$RELEASE_TAG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Set lowercase GHCR owner
        id: lowercase
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "owner=${OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Build and publish official GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ steps.lowercase.outputs.owner }}/sub2api:${{ needs.validate_release_version.outputs.image_tag }}
          build-args: |
            VERSION=${{ needs.validate_release_version.outputs.image_tag }}
            COMMIT=${{ steps.revision.outputs.sha }}
            OCI_SOURCE=https://github.com/${{ github.repository }}
      - name: Create GitHub Release assets
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: ${{ steps.tag_message.outputs.message }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_OWNER_LOWER: ${{ steps.lowercase.outputs.owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_TAG: ${{ needs.validate_release_version.outputs.release_tag }}
          IMAGE_TAG: ${{ needs.validate_release_version.outputs.image_tag }}
          REPOSITORY: ${{ github.repository }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials not configured, skipping notification"
            exit 0
          fi
          image="ghcr.io/${REPOSITORY,,}:$IMAGE_TAG"
          message="$(printf 'Sub2API %s published\n\ndocker pull %s\n\nhttps://github.com/%s/releases/tag/%s' \
            "$RELEASE_TAG" "$image" "$REPOSITORY" "$RELEASE_TAG")"
          curl --fail-with-body --silent --show-error \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$message" \
              '{chat_id: $chat_id, text: $text, disable_web_page_preview: true}')"
